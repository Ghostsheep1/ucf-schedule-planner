name: Build UCF Section Index

on:
  schedule:
    - cron: "0 4 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-index:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm install

      - name: Build daily UCF section index
        run: npm run build:index
        env:
          UCF_INDEX_TERM: Fall 2026
          UCF_INDEX_CONCURRENCY: 3
          UCF_INDEX_INCLUDE_SEATS: 1
          UCF_INDEX_INCLUDE_RMP: 1
          UCF_INDEX_RMP_CONCURRENCY: 1
          UCF_INDEX_RMP_DELAY_MS: 1200
          UCF_INDEX_RMP_RETRIES: 6

      - name: Commit index update
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add static/data/ucf-section-index.json
          if git diff --cached --quiet; then
            echo "No index changes to commit."
          else
            git commit -m "Update UCF section index"
            git push
          fi
